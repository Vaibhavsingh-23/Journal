# Render.com Configuration using Docker

services:
  - type: web
    name: journal-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: AI_SERVICE_URL
        value: https://journal-ai-service.onrender.com   # ← set to your actual Python service URL
    healthCheckPath: /journal/actuator/health

  - type: web
    name: journal-ai-service
    runtime: python
    buildCommand: "cd ai-service && pip install -r requirements.txt"
    startCommand: "cd ai-service && uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    region: singapore
    envVars:
      - key: GEMINI_API_KEY
        sync: false
