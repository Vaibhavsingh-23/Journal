<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry Details — Journal</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="pageContent" style="display:none;">
        <div id="loadingSpinner" class="loading-spinner" style="display:none;">
            <div class="spinner"></div>
            <p>Loading entry…</p>
        </div>
        <div id="errorContainer" class="alert alert-error" style="display:none;" role="alert"></div>

        <article id="entryContainer" class="entry-details-container" style="display:none;">
            <header class="entry-details-header">
                <h1 id="entryTitle" class="entry-details-title"></h1>
                <div class="entry-details-meta">
                    <span id="entryDate" class="entry-date"></span>
                    <span id="entryMood"></span>
                </div>
            </header>

            <div class="entry-details-content glass-card">
                <h3>Your Entry</h3>
                <div id="entryContent" class="entry-text"></div>
            </div>

            <section id="analysisSection" class="analysis-section glass-card">
                <h2>🤖 AI Analysis</h2>
                <div class="analysis-grid">
                    <div class="analysis-card">
                        <div class="analysis-label">Mood</div>
                        <div id="analysisMood" class="analysis-value"></div>
                    </div>
                    <div class="analysis-card">
                        <div class="analysis-label">Emotions</div>
                        <div id="analysisEmotions" class="analysis-value"></div>
                    </div>
                    <div class="analysis-card">
                        <div class="analysis-label">Sentiment</div>
                        <div id="analysisSentiment" class="analysis-value"></div>
                        <div class="sentiment-bar"><div id="sentimentBar" class="sentiment-fill"></div></div>
                    </div>
                </div>
                <div class="analysis-box">
                    <h3>Summary</h3>
                    <p id="analysisSummary"></p>
                </div>
                <div class="analysis-box motivational-box">
                    <h3>💪 Motivational Insight</h3>
                    <p id="analysisMotivation"></p>
                </div>
            </section>

            <div class="entry-actions-bar">
                <a href="entries.html" class="btn btn-secondary">← All Entries</a>
                <button class="btn btn-secondary" id="editBtn" type="button">✏️ Edit</button>
                <button class="btn btn-secondary" id="reanalyzeBtn" type="button">🔄 Re-analyze</button>
                <button class="btn btn-danger" id="deleteBtn" type="button">🗑️ Delete</button>
            </div>
        </article>
    </div>

    <div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
        <div class="modal-box">
            <h2 class="modal-title" id="editModalTitle">Edit Entry</h2>
            <div class="form-group">
                <label for="editTitle">Title</label>
                <input type="text" id="editTitle" class="form-input">
            </div>
            <div class="form-group">
                <label for="editContent">Content</label>
                <textarea id="editContent" class="form-input" rows="8"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelEditBtn" type="button">Cancel</button>
                <button class="btn btn-primary" id="saveEditBtn" type="button">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/layout.js"></script>
    <script>
        initAppLayout('entry-details');

        const urlParams = new URLSearchParams(window.location.search);
        const entryId = urlParams.get('id');
        if (!entryId) {
            window.location.href = 'entries.html';
        }

        let currentEntry = null;

        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorContainer = document.getElementById('errorContainer');
        const entryContainer = document.getElementById('entryContainer');
        const editModal = document.getElementById('editModal');

        window.addEventListener('load', loadEntry);

        async function loadEntry() {
            loadingSpinner.style.display = 'block';
            errorContainer.style.display = 'none';

            try {
                const entry = await getEntryById(entryId);
                loadingSpinner.style.display = 'none';
                if (!entry) {
                    errorContainer.textContent = 'Entry not found';
                    errorContainer.style.display = 'block';
                    return;
                }
                currentEntry = entry;
                displayEntry(entry);
            } catch {
                loadingSpinner.style.display = 'none';
                errorContainer.textContent = 'Failed to load entry.';
                errorContainer.style.display = 'block';
            }
        }

        function displayEntry(entry) {
            entryContainer.style.display = 'block';
            document.getElementById('entryTitle').textContent = entry.title;
            document.getElementById('entryDate').textContent = formatDate(entry.date, {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
            document.getElementById('entryMood').innerHTML =
                `<span class="mood-badge ${getMoodClass(entry.mood)}">${getMoodEmoji(entry.mood)} ${escapeHtml(entry.mood || 'Unknown')}</span>`;
            document.getElementById('entryContent').textContent = entry.content || 'No content';

            if (entry.analysisCompleted !== false && (entry.mood || entry.aiSummary)) {
                document.getElementById('analysisMood').textContent = `${getMoodEmoji(entry.mood)} ${entry.mood || 'Unknown'}`;
                document.getElementById('analysisEmotions').textContent = entry.emotions || 'Not analyzed';
                document.getElementById('analysisSentiment').textContent = (entry.sentimentScore || 0).toFixed(2);
                const bar = document.getElementById('sentimentBar');
                bar.className = `sentiment-fill ${getSentimentColor(entry.sentimentScore)}`;
                bar.style.width = `${getSentimentPercent(entry.sentimentScore || 0)}%`;
                document.getElementById('analysisSummary').textContent = entry.aiSummary || 'No summary';
                document.getElementById('analysisMotivation').textContent = entry.motivationalThought || 'Keep journaling!';
            } else {
                document.getElementById('analysisSection').innerHTML =
                    '<p style="color:var(--text-muted);">AI analysis not available for this entry.</p>';
            }
        }

        document.getElementById('reanalyzeBtn').addEventListener('click', async () => {
            if (!confirm('Re-analyze this entry?')) return;
            const btn = document.getElementById('reanalyzeBtn');
            btn.disabled = true;
            btn.textContent = 'Analyzing…';
            try {
                const updated = await reanalyzeEntry(entryId);
                displayEntry(updated);
                currentEntry = updated;
                showToast('Entry re-analyzed successfully!', 'success');
            } catch {
                showToast('Failed to re-analyze entry.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 Re-analyze';
            }
        });

        document.getElementById('deleteBtn').addEventListener('click', async () => {
            if (!confirm('Delete this entry permanently?')) return;
            const btn = document.getElementById('deleteBtn');
            btn.disabled = true;
            try {
                await deleteEntry(entryId);
                showToast('Entry deleted', 'success');
                setTimeout(() => { window.location.href = 'entries.html'; }, 800);
            } catch {
                showToast('Failed to delete entry.', 'error');
                btn.disabled = false;
            }
        });

        document.getElementById('editBtn').addEventListener('click', () => {
            if (!currentEntry) return;
            document.getElementById('editTitle').value = currentEntry.title || '';
            document.getElementById('editContent').value = currentEntry.content || '';
            editModal.classList.add('visible');
        });

        document.getElementById('cancelEditBtn').addEventListener('click', () => editModal.classList.remove('visible'));
        editModal.addEventListener('click', (e) => { if (e.target === editModal) editModal.classList.remove('visible'); });

        document.getElementById('saveEditBtn').addEventListener('click', async () => {
            const title = document.getElementById('editTitle').value.trim();
            const content = document.getElementById('editContent').value.trim();
            if (!title) { showToast('Title is required', 'error'); return; }

            const btn = document.getElementById('saveEditBtn');
            btn.disabled = true;
            try {
                const updated = await updateEntry(entryId, title, content);
                displayEntry(updated);
                currentEntry = updated;
                editModal.classList.remove('visible');
                showToast('Entry updated!', 'success');
            } catch {
                showToast('Failed to update entry.', 'error');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
