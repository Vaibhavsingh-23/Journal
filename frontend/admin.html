<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Journal</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="pageContent" style="display:none;">
        <header class="page-header">
            <h1>👑 Admin Console</h1>
            <p>Manage users and monitor platform activity</p>
        </header>

        <div class="admin-kpi-grid" id="kpiGrid">
            <div class="kpi-card glass-card">
                <div class="kpi-icon users" aria-hidden="true">👥</div>
                <div class="kpi-content">
                    <h4>Total Users</h4>
                    <div class="kpi-value" id="kpiTotalUsers">—</div>
                </div>
            </div>
            <div class="kpi-card glass-card">
                <div class="kpi-icon admins" aria-hidden="true">👑</div>
                <div class="kpi-content">
                    <h4>Admin Users</h4>
                    <div class="kpi-value" id="kpiAdminUsers">—</div>
                </div>
            </div>
            <div class="kpi-card glass-card">
                <div class="kpi-icon entries" aria-hidden="true">📝</div>
                <div class="kpi-content">
                    <h4>Total Entries</h4>
                    <div class="kpi-value" id="kpiTotalEntries">—</div>
                </div>
            </div>
            <div class="kpi-card glass-card">
                <div class="kpi-icon active" aria-hidden="true">📈</div>
                <div class="kpi-content">
                    <h4>Active Users</h4>
                    <div class="kpi-value" id="kpiActiveUsers">—</div>
                </div>
            </div>
        </div>

        <div class="admin-create-section glass-card">
            <h3>➕ Create New Admin User</h3>
            <form id="createAdminForm" novalidate>
                <div class="admin-form-row">
                    <div class="form-group">
                        <label for="adminUsername">Username</label>
                        <input type="text" id="adminUsername" class="form-input" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label for="adminPassword">Password</label>
                        <input type="password" id="adminPassword" class="form-input" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Admin</button>
                </div>
            </form>
        </div>

        <div id="loadingSpinner" class="loading-spinner" style="display:none;">
            <div class="spinner"></div>
            <p>Loading users…</p>
        </div>
        <div id="errorContainer" class="alert alert-error" style="display:none;" role="alert"></div>
        <div id="successContainer" class="success-container" style="display:none;"></div>

        <div class="users-table-section glass-card">
            <div class="section-header" style="margin-bottom:1rem;">
                <h2>User Management</h2>
            </div>

            <div class="table-toolbar">
                <div class="toolbar-search" style="flex:1;">
                    <span class="toolbar-search-icon" aria-hidden="true">🔍</span>
                    <input type="search" id="userSearch" class="form-input" placeholder="Search users…" aria-label="Search users">
                </div>
                <select id="roleFilter" class="form-select" style="width:auto;min-width:140px;" aria-label="Filter by role">
                    <option value="">All Roles</option>
                    <option value="ADMIN">Admin</option>
                    <option value="USER">User</option>
                </select>
            </div>

            <div class="table-wrapper">
                <table class="users-table" id="usersTable">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Roles</th>
                            <th>Entries</th>
                            <th>User ID</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>

            <div class="table-pagination">
                <span class="pagination-info" id="paginationInfo">Showing 0 users</span>
                <div class="pagination-controls">
                    <button class="btn btn-secondary btn-sm" id="prevPage" type="button" disabled>← Prev</button>
                    <button class="btn btn-secondary btn-sm" id="nextPage" type="button" disabled>Next →</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/layout.js"></script>
    <script>
        initAppLayout('admin');

        let allUsers = [];
        let filteredUsers = [];
        let currentPage = 0;
        const PAGE_SIZE = 10;

        async function getAllUsers() {
            return await apiFetch('/admin/all-user');
        }

        async function createAdminUser(username, password) {
            return await apiFetch('/admin/create-admin-user', {
                method: 'POST',
                body: JSON.stringify({ userName: username, password })
            });
        }

        document.getElementById('userSearch').addEventListener('input', () => { currentPage = 0; filterAndRender(); });
        document.getElementById('roleFilter').addEventListener('change', () => { currentPage = 0; filterAndRender(); });
        document.getElementById('prevPage').addEventListener('click', () => { currentPage--; renderTable(); });
        document.getElementById('nextPage').addEventListener('click', () => { currentPage++; renderTable(); });

        window.addEventListener('load', loadAllUsers);

        async function loadAllUsers() {
            const loadingSpinner = document.getElementById('loadingSpinner');
            const errorContainer = document.getElementById('errorContainer');

            loadingSpinner.style.display = 'block';
            errorContainer.style.display = 'none';

            try {
                allUsers = await getAllUsers() || [];
                loadingSpinner.style.display = 'none';
                updateKpis(allUsers);
                filterAndRender();
            } catch (error) {
                loadingSpinner.style.display = 'none';
                if (error.message && error.message.includes('403')) {
                    errorContainer.textContent = 'Access denied. Admin role required.';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
                } else {
                    errorContainer.textContent = 'Failed to load users.';
                }
                errorContainer.style.display = 'block';
            }
        }

        function updateKpis(users) {
            const admins = users.filter(u => u.roles && u.roles.includes('ADMIN')).length;
            const totalEntries = users.reduce((sum, u) => sum + (u.journalEntries ? u.journalEntries.length : 0), 0);
            const active = users.filter(u => u.journalEntries && u.journalEntries.length > 0).length;

            document.getElementById('kpiTotalUsers').textContent = users.length;
            document.getElementById('kpiAdminUsers').textContent = admins;
            document.getElementById('kpiTotalEntries').textContent = totalEntries;
            document.getElementById('kpiActiveUsers').textContent = active;
        }

        function filterAndRender() {
            const query = document.getElementById('userSearch').value.trim().toLowerCase();
            const role = document.getElementById('roleFilter').value;

            filteredUsers = allUsers.filter(u => {
                const name = (u.userName || '').toLowerCase();
                const matchQuery = !query || name.includes(query);
                const matchRole = !role || (u.roles && u.roles.includes(role));
                return matchQuery && matchRole;
            });

            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('usersTableBody');
            const start = currentPage * PAGE_SIZE;
            const pageUsers = filteredUsers.slice(start, start + PAGE_SIZE);

            tbody.innerHTML = '';

            if (!pageUsers.length) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--text-muted);">No users found</td></tr>';
            } else {
                pageUsers.forEach(user => tbody.appendChild(createUserRow(user)));
            }

            const totalPages = Math.ceil(filteredUsers.length / PAGE_SIZE) || 1;
            document.getElementById('paginationInfo').textContent =
                `Showing ${start + 1}–${Math.min(start + PAGE_SIZE, filteredUsers.length)} of ${filteredUsers.length} users`;
            document.getElementById('prevPage').disabled = currentPage === 0;
            document.getElementById('nextPage').disabled = currentPage >= totalPages - 1;
        }

        function createUserRow(user) {
            const row = document.createElement('tr');

            let userId = 'N/A';
            if (user.stringId) userId = String(user.stringId);
            else if (user.id) {
                userId = typeof user.id === 'object' ? String(user.id.timestamp || JSON.stringify(user.id)) : String(user.id);
            }

            const journalCount = user.journalEntries ? user.journalEntries.length : 0;
            let roleBadges = '';
            if (user.roles && user.roles.includes('ADMIN')) roleBadges += '<span class="role-badge admin-badge">ADMIN</span> ';
            if (user.roles && user.roles.includes('USER')) roleBadges += '<span class="role-badge user-badge">USER</span>';

            row.innerHTML = `
                <td data-label="Username"><strong>${escapeHtml(user.userName || 'Unknown')}</strong></td>
                <td data-label="Roles">${roleBadges || '<span class="role-badge user-badge">USER</span>'}</td>
                <td data-label="Entries">${journalCount} entries</td>
                <td data-label="User ID"><code class="user-id">${escapeHtml(userId.substring(0, 12))}…</code></td>`;
            return row;
        }

        document.getElementById('createAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if (!username || !password) { showToast('Enter username and password', 'error'); return; }
            if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }

            try {
                document.getElementById('loadingSpinner').style.display = 'block';
                await createAdminUser(username, password);
                document.getElementById('loadingSpinner').style.display = 'none';
                showToast(`Admin "${username}" created!`, 'success');
                document.getElementById('adminUsername').value = '';
                document.getElementById('adminPassword').value = '';
                await loadAllUsers();
            } catch (error) {
                document.getElementById('loadingSpinner').style.display = 'none';
                showToast(error.message || 'Failed to create admin', 'error');
            }
        });
    </script>
</body>

</html>
