<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entries — Journal</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="pageContent" style="display:none;">
        <header class="page-header">
            <h1>📝 Journal Entries</h1>
            <p>Browse, search, and explore all your journal entries</p>
        </header>

        <div class="toolbar">
            <div class="toolbar-search">
                <span class="toolbar-search-icon" aria-hidden="true">🔍</span>
                <input type="search" id="searchInput" class="form-input" placeholder="Search entries…"
                    aria-label="Search entries">
            </div>
            <div class="toolbar-filters">
                <select id="moodFilter" class="form-select" aria-label="Filter by mood" style="width:auto;min-width:140px;">
                    <option value="">All Moods</option>
                    <option value="Happy">Happy</option>
                    <option value="Sad">Sad</option>
                    <option value="Anxious">Anxious</option>
                    <option value="Grateful">Grateful</option>
                    <option value="Excited">Excited</option>
                    <option value="Reflective">Reflective</option>
                    <option value="Neutral">Neutral</option>
                    <option value="Angry">Angry</option>
                    <option value="Calm">Calm</option>
                </select>
                <select id="sortSelect" class="form-select" aria-label="Sort entries" style="width:auto;min-width:160px;">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="title">Title A–Z</option>
                    <option value="mood">Mood</option>
                </select>
                <a href="create-entry.html" class="btn btn-primary">➕ New Entry</a>
            </div>
        </div>

        <div id="loadingSpinner" class="loading-spinner" style="display:none;">
            <div class="spinner"></div>
            <p>Loading entries…</p>
        </div>
        <div id="errorContainer" class="alert alert-error" style="display:none;" role="alert"></div>
        <div id="emptyState" class="empty-state glass-card" style="display:none;">
            <div class="empty-state-icon">📝</div>
            <h3>No entries found</h3>
            <p id="emptyMessage">Start writing to see your entries here.</p>
            <a href="create-entry.html" class="btn btn-primary">Create Entry</a>
        </div>
        <div id="entriesGrid" class="entries-grid"></div>
        <p id="resultsCount" style="color:var(--text-muted);font-size:var(--text-small);margin-top:1.5rem;"></p>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/layout.js"></script>
    <script>
        initAppLayout('entries');

        let allEntries = [];

        const searchInput = document.getElementById('searchInput');
        const moodFilter = document.getElementById('moodFilter');
        const sortSelect = document.getElementById('sortSelect');

        searchInput.addEventListener('input', renderEntries);
        moodFilter.addEventListener('change', renderEntries);
        sortSelect.addEventListener('change', renderEntries);

        window.addEventListener('load', loadEntries);

        async function loadEntries() {
            const loadingSpinner = document.getElementById('loadingSpinner');
            const errorContainer = document.getElementById('errorContainer');

            loadingSpinner.style.display = 'block';
            errorContainer.style.display = 'none';

            try {
                allEntries = await getAllEntries() || [];
                loadingSpinner.style.display = 'none';
                renderEntries();
            } catch {
                loadingSpinner.style.display = 'none';
                errorContainer.textContent = 'Failed to load entries.';
                errorContainer.style.display = 'block';
            }
        }

        function renderEntries() {
            const grid = document.getElementById('entriesGrid');
            const emptyState = document.getElementById('emptyState');
            const resultsCount = document.getElementById('resultsCount');

            let filtered = [...allEntries];
            const query = searchInput.value.trim().toLowerCase();
            const mood = moodFilter.value;

            if (query) {
                filtered = filtered.filter(e =>
                    (e.title || '').toLowerCase().includes(query) ||
                    (e.content || '').toLowerCase().includes(query) ||
                    (e.aiSummary || '').toLowerCase().includes(query)
                );
            }

            if (mood) {
                filtered = filtered.filter(e => e.mood === mood);
            }

            const sort = sortSelect.value;
            filtered.sort((a, b) => {
                if (sort === 'oldest') return new Date(a.date) - new Date(b.date);
                if (sort === 'title') return (a.title || '').localeCompare(b.title || '');
                if (sort === 'mood') return (a.mood || '').localeCompare(b.mood || '');
                return new Date(b.date) - new Date(a.date);
            });

            grid.innerHTML = '';

            if (!filtered.length) {
                emptyState.style.display = 'block';
                document.getElementById('emptyMessage').textContent =
                    allEntries.length ? 'No entries match your filters.' : 'Start writing to see your entries here.';
                resultsCount.textContent = '';
                return;
            }

            emptyState.style.display = 'none';
            filtered.forEach(entry => grid.appendChild(createEntryCard(entry)));
            resultsCount.textContent = `Showing ${filtered.length} of ${allEntries.length} entries`;
        }

        function createEntryCard(entry) {
            const card = document.createElement('article');
            card.className = 'entry-card glass-card glass-card-hover';
            card.setAttribute('role', 'button');
            card.setAttribute('tabindex', '0');

            const entryId = getEntryId(entry);
            const go = () => { window.location.href = `entry-details.html?id=${entryId}`; };
            card.addEventListener('click', go);
            card.addEventListener('keypress', (e) => { if (e.key === 'Enter') go(); });

            const sentimentPercent = getSentimentPercent(entry.sentimentScore || 0);

            card.innerHTML = `
                <div class="entry-card-header">
                    <h3 class="entry-card-title">${escapeHtml(entry.title)}</h3>
                    <span class="mood-badge ${getMoodClass(entry.mood)}">${getMoodEmoji(entry.mood)} ${escapeHtml(entry.mood || 'Unknown')}</span>
                </div>
                <p class="entry-card-date">${formatDate(entry.date)}</p>
                <p class="entry-card-preview">${escapeHtml(truncateText(entry.aiSummary || entry.content || '', 160))}</p>
                <div class="entry-card-footer">
                    <div class="entry-sentiment-mini">
                        <div class="sentiment-bar"><div class="sentiment-fill ${getSentimentColor(entry.sentimentScore)}" style="width:${sentimentPercent}%"></div></div>
                        <span class="sentiment-score-text">${(entry.sentimentScore ?? 0).toFixed(1)}</span>
                    </div>
                    <span class="btn btn-ghost btn-sm">Read →</span>
                </div>`;
            return card;
        }
    </script>
</body>

</html>
